<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Checkout - Pempek Ogan Asli</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">PEMPEK OGAN ASLI</a>
            <span style="font-size:0.9rem; color:#666;">Secure Checkout Step</span>
        </div>
    </nav>

    <main class="container section page-margin">
        <div class="section-title">
            <h2>Pengiriman & Pembayaran</h2>
        </div>

        <div class="grid container-cart">
            <div class="card">
                <h3 style="margin-bottom: 20px;">Alamat Pengiriman</h3>
                <form id="checkout-form" class="flex flex-column gap-3">
                    <div class="form-group">
                        <label>Nama Lengkap Penerima</label>
                        <input type="text" required id="form-nama" placeholder="Contoh: Nazriel Wingky">
                    </div>
                    <div class="form-group">
                        <label>Nomor Telepon</label>
                        <input type="tel" required id="form-tel" placeholder="08XXXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Alamat Rumah Lengkap</label>
                        <textarea required id="form-alamat" rows="3"
                            placeholder="Nama Jalan, Blok, No Rumah, RT/RW"></textarea>
                    </div>
                    <div class="grid grid-2 gap-2">
                        <div class="form-group">
                            <label>Kota</label>
                            <input type="text" required id="form-kota">
                        </div>
                        <div class="form-group">
                            <label>Provinsi</label>
                            <input type="text" required id="form-provinsi">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Kode Pos</label>
                        <input type="text" required id="form-kodepos">
                    </div>

                    <h3 style="margin: 20px 0 10px 0;">Metode Pembayaran</h3>
                    <div class="payment-options">
                        <label class="radio-card">
                            <input type="radio" name="payment" value="Transfer Bank" checked>
                            <div class="radio-info">
                                <strong>Transfer Bank Otomatis</strong>
                                <p>BCA, Mandiri, BNI, BRI virtual account.</p>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="payment" value="COD">
                            <div class="radio-info">
                                <strong>Cash On Delivery (COD)</strong>
                                <p>Bayar langsung tunai ke kurir ketika makanan tiba.</p>
                            </div>
                        </label>
                    </div>
                </form>
            </div>

            <div class="card summary-card">
                <h3>Ringkasan Pesanan</h3>
                <hr style="border-color:#333; margin:15px 0;">
                <div id="checkout-items-preview" class="flex flex-column gap-2 mb-3">
                </div>
                <hr style="border-color:#333; margin:15px 0;">
                <div class="summary-line total-line">
                    <span>Grand Total</span>
                    <span id="checkout-grand-total">Rp 0</span>
                </div>
                <button type="submit" form="checkout-form" class="btn btn-primary mt-4" style="width:100%;">Selesaikan &
                    Bayar Pesanan</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Tampilkan preview harga & ringkasan di checkout
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        if (cart.length === 0) {
            window.location.href = 'products.html';
        }

        let subtotal = 0;
        const previewContainer = document.getElementById('checkout-items-preview');

        cart.forEach(item => {
            subtotal += item.harga * item.qty;
            previewContainer.innerHTML += `
                <div class="summary-line" style="font-size:0.9rem; color:#aaa;">
                    <span>${item.nama} (x${item.qty})</span>
                    <span>Rp ${(item.harga * item.qty).toLocaleString('id-ID')}</span>
                </div>
            `;
        });

        const totalPay = subtotal + 10000;
        document.getElementById('checkout-grand-total').textContent = `Rp ${totalPay.toLocaleString('id-ID')}`;

        // INTEGRASI WHATSAPP PENJUAL
        document.getElementById('checkout-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // 1. AMBIL DATA FORM INPUT
            const nama = document.getElementById('form-nama').value;
            const telp = document.getElementById('form-tel').value;
            const alamat = document.getElementById('form-alamat').value;
            const kota = document.getElementById('form-kota').value;
            const provinsi = document.getElementById('form-provinsi').value;
            const kodepos = document.getElementById('form-kodepos').value;
            const metodeFormat = document.querySelector('input[name="payment"]:checked').value;

            const invoiceNumber = 'INV-' + Math.floor(Math.random() * 90000 + 10000);
            const tanggalSkrg = new Date().toLocaleDateString('id-ID');

            // 2. FORMAT TEKS PESANAN UNTUK WHATSAPP
            let teksPesanan = `*ORDER BARU - PEMPEK OGAN ASLI*\n`;
            teksPesanan += `----------------------------------------\n`;
            teksPesanan += `*No. Invoice:* ${invoiceNumber}\n`;
            teksPesanan += `*Tanggal:* ${tanggalSkrg}\n\n`;

            teksPesanan += `*DATA PENERIMA:*\n`;
            teksPesanan += `• Nama: ${nama}\n`;
            teksPesanan += `• No. HP: ${telp}\n`;
            teksPesanan += `• Alamat: ${alamat}, ${kota}, ${provinsi} (${kodepos})\n\n`;

            teksPesanan += `*DAFTAR BELANJAAN:*\n`;
            cart.forEach((item, index) => {
                teksPesanan += `${index + 1}. ${item.nama} (x${item.qty}) -> Rp ${(item.harga * item.qty).toLocaleString('id-ID')}\n`;
            });

            teksPesanan += `\n----------------------------------------\n`;
            teksPesanan += `*Ongkir (Flat):* Rp 10.000\n`;
            teksPesanan += `*TOTAL BAYAR:* *Rp ${totalPay.toLocaleString('id-ID')}*\n`;
            teksPesanan += `*Metode Bayar:* ${metodeFormat}\n`;
            teksPesanan += `----------------------------------------\n\n`;
            teksPesanan += `_Mohon segera diproses ya min, terima kasih!_`;

            // 3. SIMPAN KE HISTORY LOCAL UNTUK DASHBOARD USER
            const ordersHistory = JSON.parse(localStorage.getItem('orders_history')) || [];
            const newOrder = {
                invoice: invoiceNumber,
                tanggal: tanggalSkrg,
                total: totalPay,
                metode: metodeFormat,
                status: 'Diproses'
            };
            ordersHistory.unshift(newOrder);
            localStorage.setItem('orders_history', JSON.stringify(ordersHistory));

            // 4. BERSIHKAN KERANJANG BELANJA
            localStorage.removeItem('cart');

            // 5. REDIRECT KE WHATSAPP PENJUAL
            // Masukkan nomor WA Anda di sini (Gunakan kode negara, contoh: 628123456789)
            const noWhatsapp = "6282114957466";
            const urlWhatsapp = `https://api.whatsapp.com/send?phone=${noWhatsapp}&text=${encodeURIComponent(teksPesanan)}`;

            alert('Pesanan tersimpan! Anda akan dialihkan ke WhatsApp untuk konfirmasi pembayaran.');

            // Buka WhatsApp di tab baru, lalu arahkan halaman web utama ke Dashboard
            window.open(urlWhatsapp, '_blank');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
